server:
  port: 8080

spring:
  application:
    name: chatbot-backend
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

rag:
  service:
    url: ${RAG_SERVICE_URL:http://localhost:8001}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:gemma3:4b}
  timeout-ms: 60000
