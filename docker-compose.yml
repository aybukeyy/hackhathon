services:
  ollama:
    image: ollama/ollama:latest
    container_name: ibbbot-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ibbbot-backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=gemma3:4b
      - RAG_SERVICE_URL=http://rag-service:8001
    ports:
      - "8080:8080"
    depends_on:
      - ollama
      - rag-service
    restart: unless-stopped

  rag-service:
    build: ./python-service
    container_name: ibbbot-rag
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBED_MODEL=embeddinggemma
      - CHAT_MODEL=gemma3:4b
      - INDEX_PATH=/app/rag_index.pkl
    ports:
      - "8001:8001"
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: ibbbot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
